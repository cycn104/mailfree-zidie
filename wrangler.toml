name = "mailfree-zidie"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "freemail_db" #你的d1数据库名称
database_id = "3490d7f3-ebc9-4fe5-a9cd-91c14d678c4b" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"2141083706@qq.com"}]"


# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# （D1-only 版本）
# 注意：原项目默认依赖 R2 存储完整 EML。此版本移除 R2 绑定，功能降级为：
# - 仍可接收邮件并把验证码/预览写入 D1
# - 不支持 EML 下载/附件/完整原文（除非另行扩展存储）

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true



